<!DOCTYPE html>
<html>
<head>
  <title>{% block title %}AI Career Recommendation{% endblock %}</title>
  
  <!-- Google Fonts for modern look -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">

  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

  <style>
    body {
      margin: 0;
      padding: 0;
      background: #f9f6fb;
      font-family: 'Poppins', Arial, sans-serif;
      color: #191223;
    }
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 32px;
      background-color: #8b0047;
      font-family: 'Poppins', Arial, sans-serif;
      box-shadow: 0 3px 12px rgba(139,0,71,0.07);
    }
    nav .left-links a,
    nav .right-links a {
      text-decoration: none;
      font-weight: 600;
      margin-right: 28px;
      color: #FFF;
      transition: color 0.2s;
      border-radius: 20px;
      padding: 6px 16px;
    }
    nav .left-links a:last-child,
    nav .right-links a:last-child {
      margin-right: 0;
    }
    nav .left-links a:hover,
    nav .right-links a:hover,
    nav .left-links a.active {
      background: #b43c86;
      color: #fff;
    }
    .container, .main-content {
      max-width: 1024px;
      margin: 32px auto 0;
      background: #fff;
      border-radius: 18px;
      box-shadow: 0 4px 20px 0 rgba(139,0,71,0.08);
      padding: 40px 36px 32px 36px;
    }
    h1, h2, h3, h4 {
      color: #8b0047;
      font-weight: 700;
    }
    .btn-primary, button, .btn {
      background-color: #8b0047;
      color: #fff;
      border: none;
      border-radius: 25px;
      padding: 8px 22px;
      margin-top: 10px;
      font-weight: 600;
      transition: background 0.2s;
    }
    .btn-primary:hover, button:hover, .btn:hover {
      background-color: #b43c86;
      color: white;
    }
  </style>
</head>
<body>

<nav>
  <div class="left-links">
    <a href="{{ url_for('home') }}" class="{% if request.endpoint == 'home' %}active{% endif %}">Home</a>
    <a href="{{ url_for('about') }}" class="{% if request.endpoint == 'about' %}active{% endif %}">About</a>
  </div>
  <div class="right-links">
    {% if logged_in %}
      <a href="{{ url_for('logout') }}">Logout</a>
    {% else %}
      <a href="{{ url_for('login_view') }}">Sign In</a>
    {% endif %}
  </div>
</nav>

<div class="main-content">
  {% block content %}
  {% endblock %}
</div>

<!-- Bootstrap 5 JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
