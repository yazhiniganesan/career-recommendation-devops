{% extends "base.html" %}

{% block title %}
Sign In
{% endblock %}

{% block content %}
<div class="login-container" style="max-width:400px; margin:auto; background:#fff; padding:30px; border-radius:8px; box-shadow:0 4px 12px rgb(0 0 0 / 0.15); font-family: Arial, sans-serif;">
  <h2 style="text-align:center; margin-bottom:30px; color:#111827;">Sign In</h2>
  {% if error %}
    <div style="color:red; margin-top:15px; text-align:center;">{{ error }}</div>
  {% endif %}
  <form method="POST">
    <label for="username" style="display:block; margin-top:10px; font-weight:600; color:#374151;">Username</label>
    <input type="text" id="username" name="username" required style="width:100%; padding:10px; margin-top:5px; border:1px solid #d1d5db; border-radius:4px; font-size:16px;">

    <label for="password" style="display:block; margin-top:10px; font-weight:600; color:#374151;">Password</label>
    <input type="password" id="password" name="password" required style="width:100%; padding:10px; margin-top:5px; border:1px solid #d1d5db; border-radius:4px; font-size:16px;">

    <button type="submit" style="margin-top:20px; width:100%; padding:12px; background-color:#3b82f6; color:white; border:none; border-radius:6px; font-size:16px; cursor:pointer; font-weight:600;">Log In</button>
  </form>
</div>
{% endblock %}
