{% extends "base.html" %}

{% block title %}Career Role Analysis{% endblock %}

{% block content %}
<div class="container" style="background: #fff; padding: 30px 30px; border-radius: 16px; max-width: 600px; margin: 35px auto; box-shadow: 0 2px 16px #d19; font-family: 'Poppins', Arial, sans-serif;">
  <!-- Welcome Step -->
  <div id="welcome-step">
    <h2 style="text-align:center; color:#8b0047;">Find Your Dream Career</h2>
    <p style="text-align:center; font-size:1.2rem;">
      Ready to discover your best-fit role? Answer a few questions and let's use AI to guide your path!
    </p>
    <div class="text-center mt-4">
      <button class="btn btn-primary" style="background:#8b0047; border:none;" onclick="startQuestionnaire();">
        Let's Start
      </button>
    </div>
  </div>

  <!-- Questionnaire Step (hidden at first) -->
  <form id="questionnaire-form" method="post" style="display:none;">
    <div id="question-card" class="p-4 rounded mb-4"
         style="background: #fff4fa; box-shadow: 0 4px 20px #8b004726; border-radius:18px;">
      <h4 id="question-text" class="mb-4" style="color: #8b0047;">Question will appear here</h4>
      <div id="options-container"></div>
    </div>
    <div class="d-flex justify-content-between">
      <button type="button" class="btn btn-secondary" onclick="prevQuestion()" id="prev-btn" style="display:none;">
        Previous
      </button>
      <button type="button" class="btn btn-primary" style="background:#8b0047; border:none;"
              onclick="nextQuestion()" id="next-btn">
        Next
      </button>
    </div>
    <div class="text-center mt-4">
      <button type="submit" id="submit-btn" class="btn btn-success" style="display:none;">
        Submit All Answers
      </button>
    </div>
  </form>
</div>

<script>
// Questionnaire data
const questions = [
  {
    text: "What type of work excites you the most?",
    name: "q1",
    options: [
      { label: "Building applications using code", value: "a" },
      { label: "Designing beautiful and user-friendly screens", value: "b" },
      { label: "Finding patterns and insights from data", value: "c" },
      { label: "Managing, storing, and organizing large data systems", value: "d" }
    ]
  },
  {
    text: "When solving a problem, what do you prefer?",
    name: "q2",
    options: [
      { label: "Writing logic and fixing bugs", value: "a" },
      { label: "Sketching layouts and improving user experience", value: "b" },
      { label: "Analyzing numbers and trends", value: "c" },
      { label: "Ensuring data is secure, accurate, and well-structured", value: "d" }
    ]
  },
  {
    text: "Which activity sounds more interesting to you?",
    name: "q3",
    options: [
      { label: "Developing a website or mobile app", value: "a" },
      { label: "Designing app screens in Figma", value: "b" },
      { label: "Creating charts and reports", value: "c" },
      { label: "Handling databases and backups", value: "d" }
    ]
  },
  {
    text: "What tool would you like to learn first?",
    name: "q4",
    options: [
      { label: "Programming languages (Python, Java, JavaScript)", value: "a" },
      { label: "Design tools (Figma, Adobe XD)", value: "b" },
      { label: "Excel, Power BI, Tableau", value: "c" },
      { label: "SQL, Oracle, MySQL", value: "d" }
    ]
  },
  {
    text: "How do you feel about coding?",
    name: "q5",
    options: [
      { label: "I enjoy writing and understanding code", value: "a" },
      { label: "I prefer minimal coding, more creativity", value: "b" },
      { label: "I like using tools rather than heavy coding", value: "c" },
      { label: "I use coding mainly for database tasks", value: "d" }
    ]
  },
  {
    text: "Which role would you enjoy in a team?",
    name: "q6",
    options: [
      { label: "Building features and fixing issues", value: "a" },
      { label: "Designing how the product looks and feels", value: "b" },
      { label: "Analyzing data for business decisions", value: "c" },
      { label: "Maintaining data systems and permissions", value: "d" }
    ]
  },
  {
    text: "What motivates you more?",
    name: "q7",
    options: [
      { label: "Seeing my application work perfectly", value: "a" },
      { label: "Seeing users enjoy my design", value: "b" },
      { label: "Helping companies make data-driven decisions", value: "c" },
      { label: "Ensuring data is safe and well managed", value: "d" }
    ]
  },
  {
    text: "Which problem would you like to solve?",
    name: "q8",
    options: [
      { label: "Application crashes or performance issues", value: "a" },
      { label: "Users find the app confusing", value: "b" },
      { label: "Business doesn’t understand its data", value: "c" },
      { label: "Data loss or database failure", value: "d" }
    ]
  },
  {
    text: "What kind of learning style suits you?",
    name: "q9",
    options: [
      { label: "Logical thinking and problem solving", value: "a" },
      { label: "Visual thinking and creativity", value: "b" },
      { label: "Analytical thinking and statistics", value: "c" },
      { label: "Structured thinking and system management", value: "d" }
    ]
  },
  {
    text: "Your dream workday looks like?",
    name: "q10",
    options: [
      { label: "Coding, debugging, and deploying apps", value: "a" },
      { label: "Designing screens and testing usability", value: "b" },
      { label: "Working with data, reports, and dashboards", value: "c" },
      { label: "Managing databases, access control, and backups", value: "d" }
    ]
  }
];

// Track user answers (JS only, final post will be HTML)
let currentQuestion = 0;
let answers = {};

// Setup for first step
function startQuestionnaire() {
  document.getElementById("welcome-step").style.display = "none";
  document.getElementById("questionnaire-form").style.display = "block";
  showQuestion(0);
}

function showQuestion(index) {
  const q = questions[index];
  document.getElementById("question-text").innerText = `Q${index + 1}. ${q.text}`;
  const optionsDiv = document.getElementById("options-container");
  optionsDiv.innerHTML = '';

  q.options.forEach((opt, i) => {
    const optId = `${q.name}_opt${i}`;
    const checked = answers[q.name] === opt.value ? 'checked' : '';
    optionsDiv.innerHTML += `
      <div class="form-check mb-2">
        <input type="radio" id="${optId}" name="${q.name}" value="${opt.value}"
               class="form-check-input" ${checked} required>
        <label class="form-check-label" for="${optId}">${opt.label}</label>
      </div>
    `;
  });

  // "Previous" button visibility
  document.getElementById("prev-btn").style.display = index > 0 ? '' : 'none';
  // "Next" button visibility
  document.getElementById("next-btn").style.display = index < questions.length - 1 ? '' : 'none';
  // "Submit" button only at last
  document.getElementById("submit-btn").style.display = index === questions.length - 1 ? '' : 'none';
}

function nextQuestion() {
  const q = questions[currentQuestion];
  const selected = document.querySelector(`input[name="${q.name}"]:checked`);
  if (!selected) {
    alert("Please select an option!");
    return;
  }
  answers[q.name] = selected.value;
  if (currentQuestion < questions.length - 1) {
    currentQuestion++;
    showQuestion(currentQuestion);
  }
}

function prevQuestion() {
  if (currentQuestion > 0) {
    currentQuestion--;
    showQuestion(currentQuestion);
  }
}

// Auto-restore previously-answered value if any
document.getElementById("questionnaire-form").addEventListener("change", function (e) {
  const q = questions[currentQuestion];
  if (e.target.name === q.name) {
    answers[q.name] = e.target.value;
  }
});
</script>
{% endblock %}
